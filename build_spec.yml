version: 0.2

env:
  shell: bash

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm ci --no-audit --no-fund
  pre_build:
    commands:
      - npm run lint
      - npm run typecheck
  build:
    commands:
      - npm run build
      - chmod 755 scripts/*.sh || true
      - rm -rf deploy
      - mkdir -p deploy
      - tar -czf deploy.tgz --exclude='*/node_modules' --exclude='node_modules' --exclude='.git' appspec.yml docker-compose.yml scripts backend frontend
      - tar -xzf deploy.tgz -C deploy
      - rm deploy.tgz

artifacts:
  base-directory: deploy
  files:
    - '**/*'

cache:
  paths:
    - /root/.npm/**/*
