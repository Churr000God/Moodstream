services:
  backend:
    build:
      context: ./backend
    environment:
      PORT: "3001"
      CORS_ORIGIN: "http://localhost:5173"
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "http://localhost:3001"
        VITE_DEEZER_APP_ID: ""
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
